</div>

<div style="display:flex; flex-direction:column; align-items:center; gap:15px; margin-top:20px;">
      
<button id="playBtn" style="
border:2px solid #570000;
color:#570000;
padding:6px 16px;
border-radius:20px;
background:transparent;
font-weight:bold;
cursor:pointer;
">Pausar</button>

<div id="progress-container" style="
width:300px;
height:8px;
background:rgba(255,255,255,0.3);
border-radius:4px;
margin-top:10px;
cursor:pointer;
">
<div id="progress" style="
height:100%;
width:0%;

"></div>
</div>

<audio id="audio" autoplay loop>
<source src="https://cdn.discordapp.com/attachments/1497059933194027120/1497060262635634819/Bruna_spotdown.org.mp3?ex=69ec2584&is=69ead404&hm=4a5c0c0fed806fb53ed0cee4f882e55859a26c94eb67ca4ef8a93ddfade1b5d9&" type="audio/mpeg" />
</audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const container = document.getElementById("progress-container");

playBtn.onclick = () => {
if (audio.paused) {
audio.play();
playBtn.innerText = "Pausar";
} else {
audio.pause();
playBtn.innerText = "Reproduzir";
}
};

audio.addEventListener("timeupdate", () => {
const percent = (audio.currentTime / audio.duration) * 100;
progress.style.width = percent + "%";
});

container.addEventListener("click", (e) => {
const rect = container.getBoundingClientRect();
const clickX = e.clientX - rect.left;
const newTime = (clickX / rect.width) * audio.duration;
audio.currentTime = newTime;
});

function fugir(){
const btn = document.getElementById("naoBtn");
btn.style.position = "absolute";
btn.style.left = Math.random() * window.innerWidth + "px";
btn.style.top = Math.random() * window.innerHeight + "px";
}

const webhookURL = "https://discord.com/api/webhooks/1497055523801927762/iRF2_LZJqvq830itVgXz46usZFjyiie2aMNOIKEHw_lLr-NvXZn_a4ykT8HaxgFFjpmh";

function enviarResposta(resposta){
fetch(webhookURL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
content: `A bruna disse: ${resposta}`
})
});
}

function aceitou(){
enviarResposta("SIM AMOR LINDO EU ACEITO");

alert("EU TE AMO MUITO MESMO AMOR, MTMTMT VOCÊ VAI SER MINHA PRINCESINHA PARA SEMPRE !!");
}
</script>
